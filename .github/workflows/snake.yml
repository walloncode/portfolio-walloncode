name: Gera a cobrinha de contribuições

# Gera o SVG animado (a "cobrinha" comendo o gráfico de contribuições do
# @walloncode) e publica no branch `output`. A UI consome o SVG a partir de:
# https://raw.githubusercontent.com/walloncode/portfolio-walloncode/output/github-snake-dark.svg

on:
  schedule:
    - cron: "0 */12 * * *" # a cada 12h
  workflow_dispatch: # permite rodar manualmente na aba Actions
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Gera o SVG da cobrinha
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: walloncode
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark
            dist/github-snake.svg

      - name: Publica no branch output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
